<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редагування запису</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
    <div class="container mt-4">

        <h1 class="mb-4">✏️ Редагування запису</h1>

        <div class="card">
            <div class="card-body">
                <form method="POST" action="/edit/{{ entry.id }}" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Співробітник</label>
                        <input type="text" name="employee" class="form-control" value="{{ entry.employee }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Задача</label>
                        <input type="text" name="task" class="form-control" value="{{ entry.task }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Витрачено годин</label>
                        <input type="number" name="hours" step="0.5" min="0.5" class="form-control"
                            value="{{ entry.hours }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Дата</label>
                        <input type="date" name="date" class="form-control" value="{{ entry.date }}" required>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-success">Зберегти</button>
                        <a href="/" class="btn btn-outline-secondary ms-2">Скасувати</a>
                    </div>
                </form>
            </div>
        </div>

    </div>
</body>

</html>
